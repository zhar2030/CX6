<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب خدمة - CX Strategy Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-container {
            background: #ffffff;
            padding: 40px 35px;
            border-radius: 18px;
            box-shadow: 0 10px 40px rgba(26, 43, 60, 0.1);
            width: 100%;
            max-width: 500px;
            position: relative;
            overflow: hidden;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-header img {
            max-width: 200px;
            height: auto;
            margin-bottom: 12px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 2px solid #e74c3c;
        }

        .form-header h1 {
            font-size: 24px;
            color: #1a2b3c;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .form-header p {
            font-size: 14px;
            color: #64748b;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            color: #334155;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: #fafafa;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1a2b3c;
            box-shadow: 0 0 0 3px rgba(26, 43, 60, 0.1);
            background: #fff;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover {
            background: #c0392b;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            background: #f0a99f;
            cursor: not-allowed;
        }

        .required {
            color: #e74c3c;
        }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #94a3b8;
        }

        .status-message {
            display: none;
            text-align: center;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 18px;
        }

        .status-message.success {
            display: block;
            background: #e8f8ee;
            color: #1e7e42;
            border: 1.5px solid #b7e7c6;
        }

        .status-message.error {
            display: block;
            background: #fdeceb;
            color: #c0392b;
            border: 1.5px solid #f5c2bd;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .form-container {
                padding: 30px 20px;
            }
            .brand-header img {
                max-width: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="brand-header">
            <img src="logo.png" alt="CX Strategy Lab Logo">
        </div>

        <div class="form-header">
            <h1>📝 نموذج طلب خدمة</h1>
            <p>سعداء بخدمتك</p>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <form id="serviceForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">الاسم الأول <span class="required">*</span></label>
                    <input type="text" id="firstName" name="firstName" placeholder="مثال: أحمد" required>
                </div>
                <div class="form-group">
                    <label for="lastName">الاسم الأخير <span class="required">*</span></label>
                    <input type="text" id="lastName" name="lastName" placeholder="مثال: العلي" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">البريد الإلكتروني <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label for="phone">رقم الهاتف</label>
                <input type="tel" id="phone" name="phone" placeholder="05xxxxxxxx">
            </div>

            <div class="form-group">
                <label for="service">نوع الخدمة <span class="required">*</span></label>
                <select id="service" name="service" required>
                    <option value="" disabled selected>اختر نوع الخدمة...</option>
                    <option value="استشارات-متسوق-خفي">استشارات متسوق خفي</option>
                    <option value="تحليل-تجربة-العميل">تحليل تجربة العميل</option>
                    <option value="تصميم-تجربة-العميل">تصميم تجربة العميل</option>
                    <option value="خدمة-أخرى">خدمة أخرى</option>
                </select>
            </div>

            <div class="form-group">
                <label for="details">تفاصيل الطلب</label>
                <textarea id="details" name="details" placeholder="صف لنا ما تحتاجه بالتفصيل..."></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">📧 إرسال الطلب</button>
        </form>

        <div class="footer-note">
            © CX Strategy Lab — جميع الحقوق محفوظة
        </div>
    </div>

    <script>
        const form = document.getElementById('serviceForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            statusMessage.className = 'status-message';
            statusMessage.textContent = '';

            const payload = {
                firstName: form.firstName.value.trim(),
                lastName: form.lastName.value.trim(),
                email: form.email.value.trim(),
                phone: form.phone.value.trim(),
                service: form.service.value,
                details: form.details.value.trim(),
            };

            submitBtn.disabled = true;
            submitBtn.textContent = 'جارِ الإرسال...';

            try {
                const res = await fetch('/api/send-request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'حدث خطأ أثناء الإرسال');
                }

                statusMessage.className = 'status-message success';
                statusMessage.textContent = '✅ تم إرسال طلبك بنجاح، سنتواصل معك قريبًا.';
                form.reset();
            } catch (err) {
                statusMessage.className = 'status-message error';
                statusMessage.textContent = '⚠️ ' + (err.message || 'تعذر إرسال الطلب، حاول مرة أخرى.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '📧 إرسال الطلب';
            }
        });
    </script>
</body>
</html>
